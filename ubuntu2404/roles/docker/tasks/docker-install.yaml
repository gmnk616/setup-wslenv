- name: settings daemon-reload.
  ansible.builtin.systemd:
    daemon_reload: true
  become: yes

- name: settings restart docker.
  ansible.builtin.systemd:
    name: docker
    state: restarted
  become: yes

# ユーザーをdockerグループに追加(適用にはOS(`WSL`)の再起動が必要)
- name: add user to docker group.
  ansible.builtin.user:
    name: "{{ ansible_facts['env']['USER'] }}"
    groups: docker
    append: yes
  become: yes
