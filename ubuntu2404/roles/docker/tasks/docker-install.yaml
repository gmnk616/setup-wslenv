---

# NOTE: dockerインストール手順は<https://docs.docker.com/engine/install/ubuntu/>を参考
# apt updateを実行(1回目)
- name: docker first apt update.
  ansible.builtin.apt:
    update_cache: yes
  become: yes

# dockerインストールに必要なパッケージをインストール
- name: docker install package.
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
  become: yes

# dockerリポジトリのGPGキーをシステムに追加
- name: docker repository add gpg key.
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    # TODO: このオプションはfalseにするか？
    validate_certs: false
    mode: '0644'
    force: true
  become: yes

# dockerリポジトリをAPTソースに追加
# NOTE: 2026-06-28 ansible.builtin.apt_repository は非推奨(ansible-core 2.25で削除予定)で
#       deprecation warning が出るため、後継の ansible.builtin.deb822_repository へ移行。
#       旧記述: deb [arch=... signed-by=/etc/apt/keyrings/docker.asc]
#               https://download.docker.com/linux/ubuntu <release> stable
#       deb822形式 (/etc/apt/sources.list.d/docker.sources) で出力される。
- name: docker repository add apt source.
  ansible.builtin.deb822_repository:
    name: docker
    types: deb
    uris: "https://download.docker.com/{{ ansible_facts['system'] | lower }}/{{ ansible_facts['distribution'] | lower }}"
    suites: "{{ ansible_facts['distribution_release'] }}"
    components: stable
    architectures: "{{ deb_architecture[ansible_facts['architecture']] }}"
    signed_by: /etc/apt/keyrings/docker.asc
    state: present
  become: yes

# apt updateを実行(2回目)
- name: docker second apt update.
  ansible.builtin.apt:
    update_cache: yes
  become: yes

# dockerをインストール
# `sudo apt-cache madison docker-ce`でdocker-ceのVerチェック
# `sudo apt-cache madison containerd.io`でcontainerd.ioのVerチェック
# `sudo apt-cache madison docker-buildx-plugin`でdocker-buildx-pluginのVerチェック
# `sudo apt-cache madison docker-compose-plugin`でdocker-compose-pluginのVerチェック
- name: docker install.
  ansible.builtin.apt:
    name:
      # - docker-ce
      # - docker-ce-cli
      # - containerd.io
      # - docker-buildx-plugin
      # - docker-compose-plugin
      - docker-ce=5:26.0.0-1~ubuntu.24.04~noble
      - docker-ce-cli=5:26.0.0-1~ubuntu.24.04~noble
      - containerd.io=1.6.28-2
      - docker-buildx-plugin=0.16.2-1~ubuntu.24.04~noble
      - docker-compose-plugin=2.29.1-1~ubuntu.24.04~noble
    state: fixed
  become: yes

- name: After installation start docker.
  ansible.builtin.systemd:
    name: docker
    state: started
  become: yes

- name: After installation restart docker.
  ansible.builtin.systemd:
    name: docker
    state: restarted
  become: yes

- name: docker daemon set.
  ansible.builtin.template:
    src: docker-daemon.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
  become: yes

